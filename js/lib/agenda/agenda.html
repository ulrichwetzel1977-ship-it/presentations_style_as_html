<div class="slide slide-agenda" data-slide="{{SLIDE_NUM}}" data-title="Agenda">
  <div class="branding-logo"></div>
  <div class="branding-claim"></div>
  <div class="slide-counter">{{SLIDE_NUM}} / {{TOTAL_SLIDES}}</div>
  
  <div class="slide-header">
    <div>
      <div class="slide-module-tag">{{TAG}}</div>
      <div class="slide-title">Agenda</div>
    </div>
  </div>
  <div class="slide-body">
    <ul class="agenda-list" id="agendaList">
      <li class="agenda-item">
        <span class="agenda-time">{{TIME}}</span>
        <div>
          <div class="agenda-title">{{AGENDA_TITLE}}</div>
          <div class="agenda-desc">{{AGENDA_DESCRIPTION}}</div>
        </div>
      </li>
      <li class="agenda-item is-break">
        <span class="agenda-time">{{TIME}}</span>
        <div><div class="agenda-title">Pause</div></div>
      </li>
    </ul>
  </div>
</div>
