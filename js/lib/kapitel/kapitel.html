<div class="slide slide-chapter" data-slide="{{SLIDE_NUM}}" data-title="{{SLIDE_TITLE}}">
  <div class="branding-logo" style="filter:brightness(0) invert(1); opacity:0.7;"></div>
  <div class="branding-claim"></div>
  <div class="slide-counter">{{SLIDE_NUM}} / {{TOTAL_SLIDES}}</div>
  
  <div class="chapter-content">
    <div class="chapter-number">{{CHAPTER_NUMBER}}</div>
    <div class="chapter-title">{{CHAPTER_TITLE}}</div>
    <div class="chapter-desc">{{CHAPTER_DESCRIPTION}}</div>
  </div>
</div>
