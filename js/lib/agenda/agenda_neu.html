<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Vorlage</title>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #f5f5f7;
    --border: #d2d2d7;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: #000;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* === SLIDE SYSTEM === */
  .presentation {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  .slide {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .slide-header {
    background: white;
    padding: 28px 60px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .slide-module-tag {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .slide-title {
    font-size: clamp(24px, 3vw, 36px);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .slide-body {
    padding: 40px 60px 80px;
    overflow-y: auto;
    flex: 1;
  }

  /* === AGENDA === */
  .agenda-items { list-style: none; }
  .agenda-item {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    align-items: start;
  }
  .agenda-time {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    padding-top: 2px;
  }
  .agenda-title { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .agenda-desc { font-size: 13px; color: var(--text-secondary); }
  .agenda-break {
    opacity: 0.5;
    font-style: italic;
  }

  /* === MODAL === */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 300;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 20px;
    box-shadow: var(--shadow-lg);
    width: 600px;
    max-width: 95vw;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .modal-header {
    padding: 24px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-header h2 { font-size: 20px; font-weight: 600; }

  .modal-close {
    background: var(--surface2);
    border: none;
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    transition: all 0.2s;
  }
  .modal-close:hover { background: var(--border); }

  .modal-body { padding: 24px 28px; overflow-y: auto; flex: 1; }

  .modal-footer {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: var(--accent-hover); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: var(--border); }

  /* === SETTINGS ROW === */
  .setting-row { display: flex; gap: 8px; align-items: flex-start; padding: 8px; background: var(--surface2); border-radius: var(--radius-sm); margin-bottom: 8px;}
  .setting-row input { padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font); font-size: 13px; outline: none; width: 100%; }
  .btn-icon { background: none; border: none; cursor: pointer; font-size: 16px; padding: 4px 6px; border-radius: 4px; line-height: 1; color: var(--text-secondary); transition: background .2s; }
  .btn-icon:hover { background: var(--border); }
</style>
</head>
<body>

<div class="presentation" id="presentation">
  <div class="slide slide-content active" data-title="Tagesagenda">
    <div class="slide-header">
      <div>
        <div class="slide-module-tag">Überblick</div>
        <div class="slide-title">Agenda des Tages</div>
      </div>
      <button onclick="openSettings();" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 14px;font-family:var(--font);font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;gap:6px;flex-shrink:0">⚙️ Agenda anpassen</button>
    </div>
    <div class="slide-body">
      <ul class="agenda-items" id="display-agenda-list"></ul>
    </div>
  </div>
</div><div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <h2>⚙️ Agenda bearbeiten</h2>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
        <label style="font-size:12px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;">📋 Agenda-Punkte</label>
        <button class="btn-secondary" style="font-size:11px;padding:5px 10px;" onclick="addAgendaRow()">+ Zeile</button>
      </div>
      <div id="settings-agenda-list" style="display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto;"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeSettings()">Abbrechen</button>
      <button class="btn-primary" onclick="saveSettings()">✓ Speichern & Schließen</button>
    </div>
  </div>
</div>

<script>
/* =========================== */
/* AGENDA DATA & LOGIC        */
/* =========================== */
var agendaData = [
  { time:'09:00 – 10:30', title:'📦 Modul 1 – Das Fundament', desc:'RISE with SAP? Shared Responsibility Model.', isBreak:false },
  { time:'10:30 – 10:45', title:'☕ Kaffeepause', desc:'', isBreak:true },
  { time:'10:45 – 12:30', title:'🗺️ Modul 2 – Task Mapping & Sizing', desc:'Abgleich der Basis-Aufgaben.', isBreak:false },
  { time:'12:30 – 13:30', title:'🥗 Mittagspause', desc:'', isBreak:true },
  { time:'13:30 – 15:00', title:'👤 Modul 3 – Neue Rollenbilder', desc:'Erstellung der Jobprofile.', isBreak:false },
  { time:'15:00 – 15:15', title:'☕ Kaffeepause', desc:'', isBreak:true },
  { time:'15:15 – 16:30', title:'🔍 Modul 4 – Lückenanalyse & Sourcing', desc:'Make-or-Buy Matrix live befüllen.', isBreak:false },
  { time:'16:30 – 17:00', title:'✅ Wrap-up & Next Steps', desc:'Ergebniszusammenfassung, Roadmap & Protokoll.', isBreak:false }
];

function renderAgendaSlide() {
  var list = document.getElementById('display-agenda-list');
  if (!list) return;
  list.innerHTML = '';
  agendaData.forEach(function(item) {
    if (item.isBreak) {
      list.innerHTML += '<li class="agenda-item agenda-break"><div class="agenda-time">' + item.time + '</div><div class="agenda-content"><div class="agenda-title">' + item.title + '</div></div></li>';
    } else {
      list.innerHTML += '<li class="agenda-item"><div class="agenda-time">' + item.time + '</div><div class="agenda-content"><div class="agenda-title">' + item.title + '</div><div class="agenda-desc">' + item.desc + '</div></div></li>';
    }
  });
}

function openSettings() {
  var list = document.getElementById('settings-agenda-list');
  if (!list) return;
  list.innerHTML = '';
  agendaData.forEach(function(item, idx) {
    list.innerHTML += '<div class="setting-row" id="set-ag-' + idx + '">' +
      '<input type="text" style="width:130px;flex-shrink:0;" value="' + item.time + '" id="set-ag-time-' + idx + '">' +
      '<div style="flex:1;display:flex;flex-direction:column;gap:4px;">' +
        '<input type="text" value="' + item.title.replace(/"/g,'&quot;') + '" id="set-ag-title-' + idx + '" placeholder="Titel">' +
        '<input type="text" value="' + item.desc.replace(/"/g,'&quot;') + '" id="set-ag-desc-' + idx + '" placeholder="Beschreibung (leer = Pause)">' +
      '</div>' +
      '<button class="btn-icon" onclick="removeAgendaRow(' + idx + ')">🗑️</button>' +
    '</div>';
  });
  document.getElementById('settingsModal').classList.add('open');
}

function addAgendaRow() {
  agendaData.push({ time:'00:00 – 00:00', title:'Neuer Punkt', desc:'', isBreak:false });
  openSettings();
}

function removeAgendaRow(idx) {
  agendaData.splice(idx, 1);
  openSettings();
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}

function saveSettings() {
  var newAgenda = [];
  for (var i = 0; i < agendaData.length; i++) {
    var timeEl = document.getElementById('set-ag-time-' + i);
    if (!timeEl) continue;
    var title = document.getElementById('set-ag-title-' + i).value;
    var desc  = document.getElementById('set-ag-desc-' + i).value;
    newAgenda.push({ time: timeEl.value, title: title, desc: desc, isBreak: desc.trim() === '' });
  }
  agendaData = newAgenda;
  renderAgendaSlide();
  closeSettings();
}

// Schließen des Modals bei Klick neben den Inhalt
document.getElementById('settingsModal').addEventListener('click', function(e) { 
  if (e.target === this) closeSettings(); 
});

// Initiale Ausführung beim Laden der Seite
renderAgendaSlide();

</script>
</body>
</html>
