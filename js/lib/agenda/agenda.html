<div class="agenda-wrapper">
  <div class="slide-header">
    <div>
      <div class="slide-module-tag">Überblick</div>
      <h2 class="slide-title">Agenda des Tages</h2>
    </div>
  </div>
  
  <div class="slide-body">
    <div class="agenda-actions">
      <button class="btn-secondary btn-icon-text" onclick="openAgendaSettings()">
        ⚙️ Agenda anpassen
      </button>
    </div>
    <ul class="agenda-items" id="display-agenda-list"></ul>
  </div>
</div>

<div class="modal-overlay" id="agendaSettingsModal">
  <div class="modal agenda-modal">
    <div class="modal-header">
      <h2>⚙️ Agenda Einstellungen</h2>
      <button class="modal-close" onclick="closeAgendaSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="agenda-settings-header">
        <label>📋 Agenda anpassen</label>
        <button class="btn-secondary btn-sm" onclick="addAgendaRow()">+ Zeile</button>
      </div>
      <div id="settings-agenda-list" class="settings-agenda-list"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeAgendaSettings()">Abbrechen</button>
      <button class="btn-primary" onclick="saveAgendaSettings()">✓ Speichern & Schließen</button>
    </div>
  </div>
</div>
