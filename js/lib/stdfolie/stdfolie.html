<div class="slide" data-slide="{{SLIDE_NUM}}" data-title="{{SLIDE_TITLE}}">
  <div class="branding-logo"></div>
  <div class="branding-claim"></div>
  <div class="slide-counter">{{SLIDE_NUM}} / {{TOTAL_SLIDES}}</div>
  
  <div class="slide-header">
    <div>
      <div class="slide-module-tag">{{TAG}}</div>
      <div class="slide-title">{{SLIDE_TITLE}}</div>
    </div>
  </div>
  <div class="slide-body">
    <div class="callout warning">
      <div>⚠️ <strong>{{CALLOUT_TITLE}}:</strong> {{CALLOUT_TEXT}}</div>
    </div>
    
    <div class="betriebsmodell-grid"> <div class="bm-card">
        <div class="bm-card-header">{{CARD_HEADER}}</div>
        <div class="bm-card-title">{{CARD_TITLE}}</div>
        <ul>
          <li>{{LIST_ITEM}}</li>
          <li class="con">{{LIST_ITEM_CON}}</li>
        </ul>
      </div>
    </div>
  </div>
</div>
