<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PRESENTATION_TITLE}}</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style id="basic-style">
        :root {
            /* Neutrale Fallback-Variablen */
            --primary: #0071e3; --primary-soft: #e8f0fe;
            --bg-color: #ffffff; --surface: #ffffff; --surface-alt: #f5f5f7;
            --border: #d2d2d7; --text: #1d1d1f; --text-secondary: #6e6e73;
            --danger: #ff3b30; --warning: #ff9500; --success: #34c759; --info: #0071e3;
            --radius: 8px; --radius-sm: 4px; --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --app-bg: #000000; --table-header-bg: #f5f5f7; --table-header-text: #1d1d1f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            font-family: var(--font-family); background-color: var(--app-bg);
            color: var(--text); width: 100vw; height: 100vh; overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .presentation { width: 100vw; height: 100vh; position: relative; background-color: var(--bg-color); }
        .slide { position: absolute; inset: 0; display: none; flex-direction: column; opacity: 0; transition: opacity 0.4s ease; }
        .slide.active { display: flex; opacity: 1; z-index: 10; }

        /* Globale UI Overlays */
        .controls-overlay { position: fixed; z-index: 9000; pointer-events: none; inset: 0; }
        .controls-overlay > * { pointer-events: auto; }
        
        .notes-toggle { position: fixed; right: 0; top: 50%; transform: translateY(-50%); background: var(--primary); color: #fff; border: none; padding: 12px 6px; font-size: 11px; font-weight: 700; writing-mode: vertical-lr; cursor: pointer; letter-spacing: 0.08em; }
        .nav-buttons { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; }
        .nav-btn { background: var(--primary); color: #fff; border: none; padding: 8px 22px; font-size: 18px; cursor: pointer; border-radius: var(--radius-sm); }
        
        /* Sidebar Basis */
        .notes-sidebar { position: fixed; right: -360px; top: 0; width: 360px; height: 100vh; background: var(--surface); border-left: 3px solid var(--primary); z-index: 9001; transition: right 0.3s ease; display: flex; flex-direction: column; }
        .notes-sidebar.open { right: 0; }
    </style>

    <style id="layout-css">
/* ==========================================
   LAYOUT.CSS - Globales Layout & Base Components
   ========================================== */

/* --- GRUNDSTRUKTUR & RESETS --- */
* { box-sizing: border-box; margin: 0; padding: 0; }

body, html {
    font-family: var(--font-family);
    background-color: var(--app-bg);
    color: var(--text);
    height: 100vh;
    width: 100vw;
    overflow: hidden; 
    -webkit-font-smoothing: antialiased;
}

/* --- PRÄSENTATIONS-CONTAINER --- */
.presentation {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
    background-color: var(--bg-color);
}

/* --- DIE EINZELNE FOLIE (Full-Screen) --- */
.slide {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    opacity: 0;
}

.slide.active {
    display: flex;
    opacity: 1;
    z-index: 10;
}

/* --- STANDARD SLIDE-LAYOUT --- */
.slide-header {
    padding: 24px 60px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background-color: var(--header-bg);
    flex-shrink: 0;
}

.slide-module-tag {
    font-size: 12px;
    font-weight: 600;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
}

.slide-title {
    font-size: clamp(24px, 3vw, 36px);
    font-weight: 700;
    color: var(--header-text);
    line-height: 1.2;
}

.slide-body {
    padding: 30px 60px 70px;
    overflow-y: auto;
    flex: 1;
    width: 100%;
}

/* --- BRANDING PLATZHALTER --- */
.branding-logo {
    position: absolute;
    top: 20px;
    right: 40px;
    width: 180px;
    height: 50px;
    z-index: 1000;
}

.branding-claim {
    position: absolute;
    bottom: 20px;
    left: 40px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    z-index: 1000;
}

.slide-counter {
    position: absolute;
    bottom: 20px;
    right: 40px;
    font-size: 12px;
    color: var(--text-secondary);
    z-index: 1000;
}

/* --- TYPOGRAFIE & LISTEN --- */
h1, h2, h3, h4 { color: var(--header-text); margin-bottom: 10px; }
p { font-size: 15px; line-height: 1.6; margin-bottom: 16px; color: var(--text); }
ul.standard-list { font-size: 15px; line-height: 1.6; padding-left: 24px; margin-bottom: 16px; color: var(--text); }
ul.standard-list li { margin-bottom: 8px; }

/* --- STANDARD KOMPONENTEN --- */

/* Callout / Hinweis-Boxen */
.callout {
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    gap: 14px;
    background-color: var(--info-bg);
    border-left: 4px solid var(--info);
    color: var(--text);
    font-size: 14px;
}
.callout.warning { border-color: var(--warning); background-color: var(--warning-bg); }
.callout.danger { border-color: var(--danger); background-color: var(--danger-bg); }
.callout.success { border-color: var(--success); background-color: var(--success-bg); }

/* Basis-Tabellen */
table.std-table {
    width: 100%;
    border-collapse: collapse;
    background-color: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
}
table.std-table th {
    background-color: var(--table-header-bg);
    color: var(--table-header-text);
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
}
table.std-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    vertical-align: top;
    color: var(--text);
}
table.std-table tr:last-child td { border-bottom: none; }

/* Basis-Karten (Grid) */
.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
}
.card {
    background-color: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
}
.card-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: var(--header-text); }
.card-text { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }

/* Globale UI Buttons */
.btn-primary {
    background-color: var(--primary); 
    color: #ffffff; 
    border: none;
    padding: 10px 20px; 
    border-radius: var(--radius-sm);
    font-family: inherit; 
    font-size: 14px; 
    font-weight: 600; 
    cursor: pointer;
    transition: filter 0.2s;
}
.btn-primary:hover { filter: brightness(0.9); }

.btn-secondary {
    background-color: var(--surface-alt); 
    color: var(--text); 
    border: 1px solid var(--border);
    padding: 10px 20px; 
    border-radius: var(--radius-sm);
    font-family: inherit; 
    font-size: 14px; 
    font-weight: 600; 
    cursor: pointer;
    transition: background-color 0.2s;
}
.btn-secondary:hover { background-color: var(--border); }
</style>

    <style id="theme-css">
/* ==========================================
   THEME: DATAGROUP SE (Corporate Identity)
   ========================================== */

:root {
    /* Layout Farben */
    --app-bg: #333333;
    --bg-color: #ffffff;
    --header-bg: #E6E6E6;          /* Grau hinterlegter Header */
    --surface: #ffffff;
    --surface-alt: #E6E6E6;        /* Hellgrau für alternative Flächen */
    
    /* Text & Akzente */
    --primary: #E3000F;            /* Offizielles DATAGROUP Rot */
    --primary-hover: #cc000e;
    --primary-soft: #fde5e6;
    --border: #cccccc;
    --text: #1d1d1f;
    --header-text: #1d1d1f;
    --text-secondary: #6e6e73;
    --claim-color: #E3000F;        /* Roter Claim */
    
    /* Tabellen */
    --table-header-bg: #E3000F;    /* Roter Tabellen-Kopf laut CI */
    --table-header-text: #ffffff;
    
    /* Status */
    --info: #E3000F;     --info-bg: #fde5e6;
    --success: #008a00;  --success-bg: #e8f5e9;
    --warning: #ff9500;  --warning-bg: #fff3e0;
    --danger: #E3000F;   --danger-bg: #fde5e6;

    /* Formen (0px für den eckigen CORBOX-Würfel-Look) */
    --radius: 0px;
    --radius-sm: 0px;
    --shadow: none;
    
    /* Typografie */
    --font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
}

/* --- DATAGROUP BRANDING ELEMENTS --- */
.branding-logo {
    background-image: url('https://raw.githubusercontent.com/ulrichwetzel1977-ship-it/presentations_style_as_html/main/assets/images/Datagroup_design/header/logo.png'); /* Pfad anpassen */
    background-size: contain;
    background-repeat: no-repeat;
    background-position: right top;
}

.branding-claim {
    color: var(--claim-color);
}
.branding-claim::after {
    content: "IT's that simple."; 
    display: block; 
}

/* --- DATAGROUP SPEZIFISCHE LAYOUT-ÜBERSCHREIBUNGEN --- */
.slide-header {
    border-bottom: none; /* Kein Rand unterm Header */
}

table.std-table th {
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: 1px solid var(--primary); /* Tabellenkopf-Border rot */
}

/* Spezifische DATAGROUP "Service-Block" Karte */
.card.dg-style {
    background-color: var(--primary);
    color: #ffffff;
    border: none;
}
.card.dg-style .card-title, 
.card.dg-style .card-text {
    color: #ffffff;
}

/* Disclaimer wird in DG-Präsentationen immer angezeigt */
.slide-disclaimer {
    display: flex !important;
}
</style>
    
    <style id="module-css-titel">
/* ==========================================
   TITEL / COVER SLIDE STYLES
   ========================================== */

.slide-cover {
    position: relative; /* Wichtig für das Overlay */
    /* 1. Hintergrundfarbe (greift, wenn kein Bild da ist oder das Bild lädt) */
    background-color: var(--cover-bg, var(--bg-color)); 
    
    /* 2. Hintergrundbild (greift, wenn die Variable im Theme definiert wurde) */
    background-image: var(--cover-bg-image, none);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    
    justify-content: center;
    align-items: flex-start;
    padding: 60px;
}

/* OPTIONAL ABER EMPFOHLEN: Ein leichtes Overlay, damit der weiße Text auf hellen Bildern lesbar bleibt */
.slide-cover::before {
    content: "";
    position: absolute;
    inset: 0;
    /* Nutzt eine Theme-Variable für das Overlay, standardmäßig 40% Schwarz */
    background: var(--cover-overlay, rgba(0, 0, 0, 0.4)); 
    z-index: 1;
}

/* Damit der eigentliche Text und die Logos ÜBER der Abdunkelung liegen */
.slide-cover > .branding-logo,
.slide-cover > .branding-claim,
.slide-cover > .slide-counter,
.slide-cover > .cover-content {
    position: relative;
    z-index: 2; 
}
</style>
<style id="module-css-agenda">
/* ==========================================
   AGENDA MODUL CSS
   Nutzung der globalen Variablen aus layout.css & Themes
   ========================================== */

/* --- AGENDA ANZEIGE (Folie) --- */
.agenda-wrapper {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.agenda-items { 
  list-style: none; 
  padding: 0;
  margin: 0;
}

.agenda-item {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 16px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  align-items: start;
}

.agenda-time {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary, #0071e3); /* Fallback, falls --primary fehlt */
  padding-top: 2px;
}

.agenda-title { 
  font-size: 15px; 
  font-weight: 600; 
  margin-bottom: 2px; 
  color: var(--text);
}

.agenda-desc { 
  font-size: 13px; 
  color: var(--text-secondary); 
}

.agenda-break {
  opacity: 0.5;
  font-style: italic;
}

.btn-icon-text {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

/* --- AGENDA SETTINGS MODAL --- */
.agenda-modal {
  width: 600px;
  max-height: 85vh;
}

.agenda-settings-header {
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.agenda-settings-header label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* --- AKTIONEN IM CONTENT-BEREICH --- */
.agenda-actions {
  display: flex;
  justify-content: flex-end; /* Schiebt den Button nach rechts */
  margin-bottom: 24px;       /* Abstand zur Agenda-Liste */
}

.btn-sm {
  font-size: 11px;
  padding: 5px 10px;
}

.settings-agenda-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 350px;
  overflow-y: auto;
  padding-right: 5px;
}

.setting-row { 
  display: flex; 
  gap: 8px; 
  align-items: flex-start; 
  padding: 8px; 
  background-color: var(--surface-alt, #f5f5f7); 
  border-radius: var(--radius-sm, 8px); 
}

.setting-time-input {
  width: 130px;
  flex-shrink: 0;
}

.setting-inputs-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.setting-row input[type="text"] { 
  padding: 6px 10px; 
  border: 1px solid var(--border); 
  border-radius: var(--radius-sm, 4px); 
  font-family: inherit; 
  font-size: 13px; 
  outline: none; 
  width: 100%; 
  background-color: var(--surface, #ffffff);
  color: var(--text);
}

  border-color: var(--primary);
}

.btn-icon-del { 
  background: none; 
  border: none; 
  cursor: pointer; 
  font-size: 16px; 
  padding: 4px 6px; 
  border-radius: 4px; 
  color: var(--text-secondary); 
  transition: background 0.2s, color 0.2s; 
}

.btn-icon-del:hover { 
  background-color: var(--border); 
  color: var(--danger, #ff3b30);
}

/* Basis Modal Styles (falls in layout.css nicht vollständig vorhanden) */
.modal-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius, 14px); box-shadow: 0 8px 40px rgba(0,0,0,0.12); display: flex; flex-direction: column; overflow: hidden; }
.modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-close { background: var(--surface-alt); border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; color: var(--text-secondary); }

.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
</style>

    
</head>
<body class="{{THEME_CLASS}}">
    
    <div class="controls-overlay">
        <button class="notes-toggle" onclick="toggleNotes()">N O T I Z E N</button>
        <div class="nav-buttons">
            <button class="nav-btn" onclick="navigate(-1)">&#8592;</button>
            <button class="nav-btn" onclick="navigate(1)">&#8594;</button>
        </div>
    </div>

    <div class="presentation" id="presentation">

        {{TITELFOLIE_CONTENT}}
        
        {{AGENDA_CONTENT}}
        
        {{CONTENT_SLIDES}}
        
        {{SCHLUSSFOLIE_CONTENT}}
        
        {{DISCLAIMER_CONTENT}}

    </div>

    <aside class="notes-sidebar" id="notesSidebar">
        <div style="background:var(--primary); color:#fff; padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <h4 style="margin:0; color:#fff; font-size:14px;">📝 Protokoll & Notizen</h4>
            <button onclick="toggleNotes()" style="background:none; border:none; color:#fff; cursor:pointer; font-size:16px;">✕</button>
        </div>
        <div id="notesSlideInfo" style="padding:10px 15px; background:var(--surface-alt); font-size:12px; color:var(--text-secondary); font-weight:bold; border-bottom:1px solid var(--border);">Folie 1</div>
        
        <textarea id="notesTextarea" placeholder="Notizen zur aktuellen Folie..." style="flex:1; padding:15px; border:none; outline:none; resize:none; font-family:inherit; font-size:13px; background:var(--surface); color:var(--text);"></textarea>
        
        <div style="padding:10px; border-top:1px solid var(--border); display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <button onclick="exportPresentationPDF()" style="padding:8px; background:var(--primary); color:#fff; border:none; cursor:pointer; font-size:12px; font-weight:bold; border-radius:var(--radius-sm);">PDF Präsentation</button>
            <button onclick="exportNotesTXT()" style="padding:8px; background:var(--surface-alt); color:var(--text); border:1px solid var(--border); cursor:pointer; font-size:12px; font-weight:bold; border-radius:var(--radius-sm);">TXT Protokoll</button>
            <button onclick="exportJSON()" style="padding:8px; background:#1d1d1f; color:#fff; border:none; cursor:pointer; font-size:12px; font-weight:bold; border-radius:var(--radius-sm);">JSON Speichern</button>
            <button onclick="document.getElementById('json-upload').click()" style="padding:8px; background:var(--surface-alt); color:var(--text); border:1px solid var(--border); cursor:pointer; font-size:12px; font-weight:bold; border-radius:var(--radius-sm);">JSON Laden</button>
            <input type="file" id="json-upload" style="display:none" accept=".json" onchange="importJSON(event)">
        </div>
    </aside>

    <script>
        let currentIdx = 0;
        let notesData = {};

        // Hilfsfunktion, um immer die aktuellen Slides zu holen (wichtig bei dynamischem Aufbau)
        function getSlides() {
            return document.querySelectorAll('.presentation > .slide');
        }

        // 1. Init & Navigation
        function initPresentation() {
            showSlide(currentIdx);
            
            document.addEventListener('keydown', (e) => {
                // Keine Navigation triggern, wenn der User gerade tippt
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') navigate(1);
                if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
            });
        }

        function showSlide(idx) {
            const slides = getSlides();
            if (slides.length === 0) return;
            
            // Aktuelle ausblenden
            if(slides[currentIdx]) slides[currentIdx].classList.remove('active');
            
            // Neue berechnen
            currentIdx = Math.max(0, Math.min(idx, slides.length - 1));
            slides[currentIdx].classList.add('active');
            
            updateNotesPanel();
        }

        function navigate(dir) { showSlide(currentIdx + dir); }

        // 2. Notes & Protokoll
        function toggleNotes() { document.getElementById('notesSidebar').classList.toggle('open'); }
        
        function updateNotesPanel() {
            const slides = getSlides();
            if (slides.length === 0) return;
            const slide = slides[currentIdx];
            const t = slide.getAttribute('data-title') || 'Unbenannt';
            document.getElementById('notesSlideInfo').textContent = `Folie ${currentIdx + 1} – ${t}`;
            document.getElementById('notesTextarea').value = notesData[currentIdx] || '';
        }
        
        document.getElementById('notesTextarea').addEventListener('input', (e) => { 
            notesData[currentIdx] = e.target.value; 
        });

        // 3. Export & Import
        function exportPresentationPDF() {
            const element = document.getElementById('presentation');
            const slides = getSlides();
            
            // Alle Slides temporär sichtbar machen für den Export
            slides.forEach(s => { s.style.position = 'relative'; s.style.display = 'flex'; s.style.opacity = '1'; });
            
            html2pdf().set({
                margin: 0, filename: 'Praesentation.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'landscape' }
            }).from(element).save().then(() => {
                // Layout wiederherstellen
                slides.forEach(s => { s.style.position = 'absolute'; s.style.display = 'none'; });
                showSlide(currentIdx);
            });
        }

        function exportNotesTXT() {
            const slides = getSlides();
            let out = `WORKSHOP-PROTOKOLL\n\n`;
            slides.forEach((s, i) => {
                if(notesData[i] && notesData[i].trim() !== '') {
                    out += `--- Folie ${i+1}: ${s.getAttribute('data-title') || 'Unbenannt'} ---\n${notesData[i]}\n\n`;
                }
            });
            const blob = new Blob([out], { type: 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'protokoll.txt'; a.click();
        }

        function exportJSON() {
            const data = {
                notes: notesData
            };
            
            // Hook für externe Module (z.B. Kanban, Agenda, Job-Profile), um ihren Status im JSON zu speichern
            if(window.gatherModuleStates) {
                data.modules = window.gatherModuleStates();
            }

            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'workshop-status.json'; a.click();
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if(data.notes) { 
                        notesData = data.notes; 
                        updateNotesPanel(); 
                    }
                    
                    // Hook für externe Module, um ihren Status wiederherzustellen
                    if(data.modules && window.applyModuleStates) {
                        window.applyModuleStates(data.modules);
                    }
                    
                    alert('Status erfolgreich geladen!');
                } catch(err) { 
                    alert('Fehler beim Laden der JSON-Datei.'); 
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Input resetten, damit selbe Datei nochmal geladen werden kann
        }

        window.onload = initPresentation;
    </script>

    <script id="module-js-titel">
/**
 * MODULE: TITEL & SETTINGS
 * Verwaltung der Präsentationsdaten und Synchronisation der Claims.
 */
const TitelModule = {
    
    init: function() {
        // Initiale Daten aus dem HTML in die Input-Felder laden
        document.getElementById('inp-title').value = document.getElementById('cover-title').textContent;
        document.getElementById('inp-customer').value = document.getElementById('cover-customer').textContent;
        document.getElementById('inp-date').value = document.getElementById('cover-date').textContent;
        document.getElementById('inp-presenter').value = document.getElementById('cover-presenter').textContent;
        
        // Initialen Claim setzen
        this.updateGlobalClaims(document.getElementById('inp-customer').value);
    },

    openSettings: function() {
        document.getElementById('titelSettingsModal').classList.add('open');
    },

    closeSettings: function() {
        document.getElementById('titelSettingsModal').classList.remove('open');
    },

    applySettings: function() {
        const title = document.getElementById('inp-title').value;
        const customer = document.getElementById('inp-customer').value;
        const date = document.getElementById('inp-date').value;
        const presenter = document.getElementById('inp-presenter').value;

        // UI auf der Titelfolie aktualisieren
        document.getElementById('cover-title').textContent = title;
        document.getElementById('cover-customer').textContent = customer;
        document.getElementById('cover-date').textContent = date;
        document.getElementById('cover-presenter').textContent = presenter;
        
        // Browsertitel aktualisieren
        document.title = title;

        // Globalen Claim auf allen Folien synchronisieren
        this.updateGlobalClaims(customer);

        this.closeSettings();
        
        // Optional: Status für JSON-Export sichern
        if (window.exportJSON) {
            console.log("Settings angewendet.");
        }
    },

    /**
     * Aktualisiert den Claim-Text im Branding-Bereich aller Slides
     */
    updateGlobalClaims: function(customerName) {
        const claims = document.querySelectorAll('.branding-claim');
        claims.forEach(el => {
            el.innerHTML = `SAP Transformation | ${customerName}`;
        });
    }
};

// Initialisierung
document.addEventListener('DOMContentLoaded', () => TitelModule.init());
</script>
<script id="module-js-agenda">
/* ==========================================
   AGENDA LOGIK
   ========================================== */

// Initiale Agenda-Daten
let agendaData = [
  { time:'09:00 – 10:30', title:'📦 Modul 1 – Das Fundament', desc:'Einführung und Grundlagen.', isBreak:false },
  { time:'10:30 – 10:45', title:'☕ Kaffeepause', desc:'', isBreak:true },
  { time:'10:45 – 12:30', title:'🗺️ Modul 2 – Deep Dive', desc:'Vertiefung der Thematik.', isBreak:false }
];

// Rendert die Agenda auf der Präsentationsfolie
function renderAgendaSlide() {
  const list = document.getElementById('display-agenda-list');
  if (!list) return;
  list.innerHTML = '';
  
  agendaData.forEach(item => {
    if (item.isBreak) {
      list.innerHTML += `
        <li class="agenda-item agenda-break">
          <div class="agenda-time">${item.time}</div>
          <div class="agenda-content">
            <div class="agenda-title">${item.title}</div>
          </div>
        </li>`;
    } else {
      list.innerHTML += `
        <li class="agenda-item">
          <div class="agenda-time">${item.time}</div>
          <div class="agenda-content">
            <div class="agenda-title">${item.title}</div>
            <div class="agenda-desc">${item.desc}</div>
          </div>
        </li>`;
    }
  });
}

// Öffnet das Modal und baut die Eingabefelder auf
function openAgendaSettings() {
  const list = document.getElementById('settings-agenda-list');
  if (!list) return;
  list.innerHTML = '';
  
  agendaData.forEach((item, idx) => {
    list.innerHTML += `
      <div class="setting-row" id="set-ag-${idx}">
        <input type="text" class="setting-time-input" value="${item.time}" id="set-ag-time-${idx}">
        <div class="setting-inputs-col">
          <input type="text" value="${item.title.replace(/"/g,'&quot;')}" id="set-ag-title-${idx}" placeholder="Titel">
          <input type="text" value="${item.desc.replace(/"/g,'&quot;')}" id="set-ag-desc-${idx}" placeholder="Beschreibung (leer = Pause)">
        </div>
        <button class="btn-icon-del" onclick="removeAgendaRow(${idx})" title="Zeile löschen">🗑️</button>
      </div>`;
  });
  
  document.getElementById('agendaSettingsModal').classList.add('open');
}

// Fügt eine neue, leere Zeile im Modal hinzu
function addAgendaRow() {
  agendaData.push({ time:'00:00 – 00:00', title:'Neuer Punkt', desc:'', isBreak:false });
  openAgendaSettings(); // Re-render Modal
}

// Löscht eine Zeile im Modal
function removeAgendaRow(idx) {
  agendaData.splice(idx, 1);
  openAgendaSettings(); // Re-render Modal
}

// Schließt das Modal ohne zu speichern
function closeAgendaSettings() {
  const modal = document.getElementById('agendaSettingsModal');
  if (modal) modal.classList.remove('open');
}

// Speichert die Eingaben aus dem Modal in das Array und aktualisiert die Ansicht
function saveAgendaSettings() {
  let newAgenda = [];
  for (let i = 0; i < agendaData.length; i++) {
    const timeEl = document.getElementById(`set-ag-time-${i}`);
    if (!timeEl) continue;
    
    const title = document.getElementById(`set-ag-title-${i}`).value;
    const desc  = document.getElementById(`set-ag-desc-${i}`).value;
    
    newAgenda.push({ 
      time: timeEl.value, 
      title: title, 
      desc: desc, 
      isBreak: desc.trim() === '' 
    });
  }
  
  agendaData = newAgenda;
  renderAgendaSlide();
  closeAgendaSettings();
}

// Schließe Modal bei Klick auf den Hintergrund
document.addEventListener('DOMContentLoaded', () => {
  const modalOverlay = document.getElementById('agendaSettingsModal');
  if (modalOverlay) {
    modalOverlay.addEventListener('click', function(e) { 
      if (e.target === this) closeAgendaSettings(); 
    });
  }
  
  // Initiales Rendern beim Laden der Seite
  renderAgendaSlide();
});
</script>
